spring:
  application:
    name: structure-tenant-api-test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

  flyway:
    enabled: false

  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

server:
  port: 0

logging:
  level:
    cn.structured: DEBUG
structure:
